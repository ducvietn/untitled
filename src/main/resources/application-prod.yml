# ============================================================
# TeamUp — Production Configuration
# Activate with: --spring.profiles.active=prod
# ============================================================

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: TeamUp

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?ssl-mode=REQUIRED&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        generate_statistics: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

storage:
  upload-dir: ${UPLOAD_DIR:/app/storage/uploads}
  allowed-extensions: pdf,pptx,docx,zip
  max-file-size-mb: 10

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:#{null}}
  api-key:    ${CLOUDINARY_API_KEY:#{null}}
  api-secret: ${CLOUDINARY_API_SECRET:#{null}}

academic-domains:
  whitelist:
    - "^.+@(.+\\.)?vnu\\.edu\\.vn$"
    - "^.+@(.+\\.)?usth\\.edu\\.vn$"
    - "^.+@.+\\.edu\\.vn$"

scheduling:
  contribution-check:
    cron: "0 0 2 * * *"
    stale-threshold-hours: 72

logging:
  level:
    com.teamup.teamup: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
