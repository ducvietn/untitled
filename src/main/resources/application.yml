# ============================================================
# TeamUp — Application Configuration
# Profile: development (activated by default, override with --spring.profiles.active=prod)
# ============================================================

# --- Server ---
server:
  port: 8080
  servlet:
    context-path: /api

# --- Spring Application ---
spring:
  application:
    name: TeamUp

  # ============================================================
  # Database — MySQL 8.x
  # Switch driver to: org.postgresql.Driver  for PostgreSQL
  # ============================================================
  datasource:
    url: jdbc:mysql://localhost:3306/teamup_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ============================================================
  # JPA / Hibernate
  # ============================================================
  jpa:
    hibernate:
      ddl-auto: validate          # validate in prod; use 'update' only in early dev
    show-sql: true                # disable in prod
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        generate_statistics: false

  # ============================================================
  # Flyway — DB Migrations
  # ============================================================
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  # ============================================================
  # Servlet / Multipart (File Upload)
  # ============================================================
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  # ============================================================
  # JWT Secret (override via environment variable in prod)
  # ============================================================
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-change-in-production-minimum-32-chars}
  expiration-ms: 86400000        # 24 hours

# ============================================================
# File Storage
# ============================================================
storage:
  upload-dir: ${UPLOAD_DIR:./storage/uploads}
  allowed-extensions: pdf,pptx,docx,zip
  max-file-size-mb: 10

# ============================================================
# Cloudinary (Production Storage)
# Set environment variables:
#   CLOUDINARY_CLOUD_NAME=your-cloud-name
#   CLOUDINARY_API_KEY=your-api-key
#   CLOUDINARY_API_SECRET=your-api-secret
# Without these, LocalStorageServiceImpl is used automatically.
# ============================================================
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:#{null}}
  api-key:    ${CLOUDINARY_API_KEY:#{null}}
  api-secret: ${CLOUDINARY_API_SECRET:#{null}}

# ============================================================
# Academic Domain Whitelist — Teacher Auto-Approval
# Each entry is a Java regex pattern matched (case-insensitively) against
# the registrant's email domain.
# Patterns are evaluated in order; first match wins.
# ============================================================
academic-domains:
  whitelist:
    - "^.+@(.+\\.)?vnu\\.edu\\.vn$"   # vnu.edu.vn and all subdomains
    - "^.+@(.+\\.)?usth\\.edu\\.vn$"  # usth.edu.vn and all subdomains
    - "^.+@.+\\.edu\\.vn$"             # any other .edu.vn domain
    # Add more institutions here:
    # - "^.+@university\\.edu\\.vn$"

# ============================================================
# Scheduling — Cron job (the "Referee")
# ============================================================
scheduling:
  contribution-check:
    cron: "0 0 2 * * *"         # Every day at 2:00 AM
    stale-threshold-hours: 72

# ============================================================
# Logging
# ============================================================
logging:
  level:
    com.teamup.teamup: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
